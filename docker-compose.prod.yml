version: "3.9"

# Stash — production / self-hosting deployment
#
# Usage:
#   cp .env.example .env        # fill in required values (see README)
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env vars in .env:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   PUBLIC_URL                  (your public frontend URL, e.g. https://app.example.com)
#   CORS_ORIGINS                (comma-separated allowed origins)
#
# Optional (embeddings default to local sentence-transformers — no key needed):
#   OPENAI_API_KEY or HF_TOKEN  (use hosted embedding provider instead of local)
#   S3_ENDPOINT / S3_BUCKET / …  (enable file uploads)
#   COLLAB_PUBLIC_URL           (WebSocket URL if collab is not routed under /collab)

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    expose:
      - "5432"        # not published to host — only reachable by other services
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/Fergana-Labs/stash-backend:latest
    restart: always
    expose:
      - "3456"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/Fergana-Labs/stash-frontend:latest
    restart: always
    expose:
      - "3457"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
      NEXT_PUBLIC_COLLAB_URL: ${COLLAB_PUBLIC_URL:-}

  collab:
    image: ghcr.io/Fergana-Labs/stash-collab:latest
    restart: always
    expose:
      - "3458"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BACKEND_URL: http://backend:3456

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - collab

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
