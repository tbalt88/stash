version: "3.9"

# Stash — production / self-hosting deployment
#
# Usage:
#   cp .env.example .env        # fill in required values (see README)
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env vars in .env:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   PUBLIC_URL                  (your public frontend URL, e.g. https://app.example.com)
#   CORS_ORIGINS                (comma-separated allowed origins)
#   INTEGRATIONS_ENCRYPTION_KEY (Fernet key for OAuth tokens — generate once, never rotate without re-auth)
#
# Optional (embeddings default to local sentence-transformers — no key needed):
#   OPENAI_API_KEY or HF_TOKEN  (use hosted embedding provider instead of local)
#   S3_ENDPOINT / S3_BUCKET / …  (enable file uploads)
#   GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET / GOOGLE_OAUTH_REDIRECT_URI
#   GITHUB_OAUTH_CLIENT_ID / GITHUB_OAUTH_CLIENT_SECRET / GITHUB_OAUTH_REDIRECT_URI
#   NOTION_OAUTH_CLIENT_ID / NOTION_OAUTH_CLIENT_SECRET / NOTION_OAUTH_REDIRECT_URI
#   GOOGLE_PICKER_API_KEY / GOOGLE_PICKER_APP_ID
#   INTEGRATIONS_ENCRYPTION_KEY (Fernet key — encrypt OAuth tokens at rest)
#   COLLAB_PUBLIC_URL           (WebSocket URL if collab is not routed under /collab)

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    expose:
      - "5432"        # not published to host — only reachable by other services
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    # AOF persistence so in-flight tasks survive a Redis restart.
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/Fergana-Labs/stash-backend:latest
    restart: always
    expose:
      - "3456"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ghcr.io/Fergana-Labs/stash-backend:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        # Wait for Alembic — the backend's /health only returns 200
        # after init_db() (which runs migrations) completes.
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  # Beat must run as exactly one instance. Multiple beat processes will
  # fire the same scheduled task multiple times.
  beat:
    image: ghcr.io/Fergana-Labs/stash-backend:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "backend.celery_app", "beat", "--loglevel=info"]

  frontend:
    image: ghcr.io/Fergana-Labs/stash-frontend:latest
    restart: always
    expose:
      - "3457"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
      # SSR requests must hit the backend over the docker network, not the
      # public URL (which would loop through Caddy back into the container).
      BACKEND_INTERNAL_URL: http://backend:3456
      NEXT_PUBLIC_COLLAB_URL: ${COLLAB_PUBLIC_URL:-}

  collab:
    image: ghcr.io/Fergana-Labs/stash-collab:latest
    restart: always
    expose:
      - "3458"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BACKEND_URL: http://backend:3456

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - collab

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
