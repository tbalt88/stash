# Stash — production / self-hosting deployment
#
# Usage:
#   cp .env.example .env        # fill in required values
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Host locally:
#   docker compose -f docker-compose.prod.yml -f docker-compose.local.yml pull
#   docker compose -f docker-compose.prod.yml -f docker-compose.local.yml up -d
#
# Backend, frontend, and collab use pre-built images from GHCR.
#
# Required env vars in .env:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   PUBLIC_URL                  (your public frontend URL, e.g. https://app.example.com)
#   CORS_ORIGINS                (comma-separated allowed origins)
#
# Optional:
#   ANTHROPIC_API_KEY           (enables ask-the-workspace + session summarization)
#   OPENAI_API_KEY or HF_TOKEN  (use hosted embedding provider instead of local)
#   S3_ENDPOINT / S3_BUCKET / …  (enable file uploads)
#   INTEGRATIONS_ENCRYPTION_KEY (optional override; generated durably when unset)

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/fergana-labs/stash-backend:0.1.43
    restart: always
    expose:
      - "3456"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_secrets:/app/.secrets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    image: ghcr.io/fergana-labs/stash-backend:0.1.43
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_secrets:/app/.secrets
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  beat:
    image: ghcr.io/fergana-labs/stash-backend:0.1.43
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_secrets:/app/.secrets
    command: ["celery", "-A", "backend.celery_app", "beat", "--loglevel=info"]

  frontend:
    image: ghcr.io/fergana-labs/stash-frontend:0.1.43
    restart: always
    expose:
      - "3457"
    depends_on:
      - backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:3456

  collab:
    image: ghcr.io/fergana-labs/stash-collab:0.1.43
    restart: always
    expose:
      - "3458"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BACKEND_URL: http://backend:3456

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - collab

volumes:
  postgres_data:
  redis_data:
  backend_secrets:
  caddy_data:
  caddy_config:
