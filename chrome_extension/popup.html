<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 4px;
    }
    .muted { color: #6b7280; }
    .row { margin-top: 12px; }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #F97316;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:not(.secondary):not(.outline):hover { background: #EA580C; }
    button.outline {
      background: none;
      color: #EA580C;
      border: 1px solid #F97316;
    }
    button.outline:hover { background: #fff7ed; }
    button.secondary {
      background: none;
      color: #6b7280;
      font-weight: 400;
      text-decoration: underline;
      padding: 4px 0;
    }
    select, input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: #6b7280;
      font-size: 12px;
    }
    .error {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #fef2f2;
      color: #b91c1c;
      word-break: break-word;
    }
    a { color: #EA580C; }
    details { margin-top: 16px; }
    summary { color: #9ca3af; font-size: 12px; cursor: pointer; }
    .section-label {
      margin: 16px 0 6px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .source-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .source-meta { flex: 1; min-width: 0; }
    .source-name { font-weight: 600; font-size: 13px; }
    .source-detail { font-size: 11.5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .dot.on { background: #16a34a; }
    .dot.off { background: #d1d5db; }
    button.sync-now {
      width: auto;
      padding: 4px 10px;
      font-size: 12px;
      flex: none;
    }
    button.sync-now:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <h1><img src="icons/icon16.png" width="16" height="16" alt="" style="vertical-align: -2px; margin-right: 6px;" />Stash Sync</h1>
  <div id="app" class="muted">Loading…</div>
  <script src="dist/popup.js"></script>
</body>
</html>
