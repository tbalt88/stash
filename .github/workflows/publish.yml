name: Publish stashai to PyPI

# Fires on every push to main. If pyproject.toml carries a version whose
# `v<version>` tag doesn't exist yet, the job tags the commit and publishes
# the sdist + wheel to PyPI. Existing versions are a no-op, so the workflow
# is safe to re-run (including via workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # required for PyPI trusted publishing (OIDC)
      contents: write    # required to push the release tag
      actions: write     # required to dispatch docker-publish on the tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect version bump
        id: check
        run: |
          VER=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG="v$VER"
          echo "pyproject version: $VER"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VER — will tag and publish."
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag release
        if: steps.check.outputs.release == 'true'
        env:
          TAG: ${{ steps.check.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      # Tag pushes made with GITHUB_TOKEN never fire docker-publish's
      # `on: push: tags` trigger (GitHub's recursion guard), so dispatch it
      # explicitly — workflow_dispatch is exempt from that guard.
      - name: Build release images
        if: steps.check.outputs.release == 'true'
        env:
          TAG: ${{ steps.check.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docker-publish.yml --ref "$TAG"

      - name: Install build tooling
        if: steps.check.outputs.release == 'true'
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        if: steps.check.outputs.release == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
