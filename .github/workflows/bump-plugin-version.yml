name: Bump release versions

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'stashai/**'
      - 'plugins/claude-plugin/**'
      - 'plugins/codex-plugin/**'
      - 'plugins/cursor-plugin/**'
      - 'plugins/opencode-plugin/**'
      # Server code ships as versioned GHCR images pinned in
      # docker-compose.prod.yml, so server changes must also cut a release.
      - 'backend/**'
      - 'frontend/**'
      - 'collab/**'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write    # required to dispatch publish.yml after the bump
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check triggering commit
        id: trigger
        run: |
          if git log -1 --pretty=%s | grep -q "^chore: bump stash release"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package and Claude plugin versions
        id: bump
        if: steps.trigger.outputs.skip != 'true'
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          import re

          def bump_patch(version: str) -> str:
              major, minor, patch = version.split(".")
              return f"{major}.{minor}.{int(patch) + 1}"

          pyproject = pathlib.Path("pyproject.toml")
          pyproject_text = pyproject.read_text()
          pyproject_match = re.search(r'(?m)^version = "([^"]+)"$', pyproject_text)
          if pyproject_match is None:
              raise SystemExit("pyproject.toml has no project version")
          package_old = pyproject_match.group(1)
          package_new = bump_patch(package_old)
          pyproject.write_text(
              pyproject_text[: pyproject_match.start(1)]
              + package_new
              + pyproject_text[pyproject_match.end(1) :]
          )

          plugin_path = pathlib.Path("plugins/claude-plugin/.claude-plugin/plugin.json")
          plugin = json.loads(plugin_path.read_text())
          plugin_old = plugin["version"]
          plugin_new = bump_patch(plugin_old)
          plugin["version"] = plugin_new
          plugin_path.write_text(json.dumps(plugin, indent=2) + "\n")

          marketplace_path = pathlib.Path(".claude-plugin/marketplace.json")
          marketplace = json.loads(marketplace_path.read_text())
          marketplace["plugins"][0]["version"] = plugin_new
          marketplace_path.write_text(json.dumps(marketplace, indent=2) + "\n")

          compose_path = pathlib.Path("docker-compose.prod.yml")
          compose_text = compose_path.read_text()
          compose_path.write_text(
              re.sub(
                  r"(ghcr\.io/fergana-labs/stash-[a-z]+):\S+",
                  rf"\g<1>:{package_new}",
                  compose_text,
              )
          )

          # The Claude plugin ships its scripts through the marketplace,
          # separately from the PyPI stashai library, so its cached scripts can
          # lag the library and break their imports. Pin them to the stashai
          # version published in this same bump so `_run.sh` installs that exact
          # version instead of `@latest`. (codex/cursor/opencode run from inside
          # the installed package, so they stay in lockstep without a pin.)
          for pin in pathlib.Path("plugins").glob("*/scripts/stashai-version"):
              pin.write_text(package_new + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              print(f"package_version={package_new}", file=output)
              print(f"plugin_version={plugin_new}", file=output)

          print(f"Bumped stashai {package_old} -> {package_new}")
          print(f"Bumped Claude plugin {plugin_old} -> {plugin_new}")
          PY

      - name: Commit and push
        if: steps.trigger.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml plugins/claude-plugin/.claude-plugin/plugin.json .claude-plugin/marketplace.json docker-compose.prod.yml plugins/*/scripts/stashai-version
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore: bump stash release to ${{ steps.bump.outputs.package_version }} and plugin to ${{ steps.bump.outputs.plugin_version }}"
          git push

      # The bump commit is pushed with GITHUB_TOKEN, which never fires
      # publish.yml's `on: push` trigger (GitHub's recursion guard), so the
      # release would otherwise wait for the next human push to main.
      # workflow_dispatch is exempt from the guard.
      - name: Publish release
        if: steps.trigger.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --ref main
