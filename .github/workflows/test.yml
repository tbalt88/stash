name: CI

on:
  push:
  pull_request:

jobs:
  frontend-lint:
    name: Frontend lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  frontend-test:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      # Pinned to requirements-dev.txt so CI and local runs format identically —
      # an unpinned formatter drifts style across releases and re-reds every PR.
      - run: pip install "$(grep '^ruff==' backend/requirements-dev.txt)"
      - run: ruff check backend/ cli/
      - run: ruff format --check backend/ cli/

  plugin-test:
    name: Plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install plugin test dependencies
        run: pip install -r backend/requirements-dev.txt -e .

      - name: Run plugin tests
        run: python -m pytest plugins/tests --no-cov

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install audit tools
        run: python -m pip install pip-audit

      - name: Audit backend Python requirements
        run: python -m pip_audit -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Audit CLI Python package
        run: python -m pip_audit .

      - name: Audit SDK Python package
        run: python -m pip_audit sdk

      - name: Audit frontend npm lock
        run: npm audit --audit-level=moderate --package-lock-only
        working-directory: frontend

      - name: Audit www npm lock
        run: npm audit --audit-level=moderate --package-lock-only
        working-directory: www

      - name: Audit collab npm lock
        run: npm audit --audit-level=moderate --package-lock-only
        working-directory: collab

  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: stash
          POSTGRES_PASSWORD: stash
          POSTGRES_DB: stash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stash"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
          TEST_DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
        run: python -m alembic upgrade head

      - name: Run pytest with coverage
        env:
          DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
          TEST_DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
        run: python -m pytest -v
