version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stash
      POSTGRES_PASSWORD: stash
      POSTGRES_DB: stash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stash"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      PUBLIC_URL: http://localhost:3457
      CORS_ORIGINS: "http://localhost:3457,http://localhost:3456"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3457:3457"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3456
    depends_on:
      - backend

  collab:
    build:
      context: ./collab
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3458:3458"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      BACKEND_URL: http://backend:3456

volumes:
  postgres_data:
