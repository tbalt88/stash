version: "3.9"

# Shared environment block — backend + worker + beat all need the same
# secrets / API keys because tasks may run on the worker. Each service
# overrides DATABASE_URL/REDIS_URL/CORS/PUBLIC_URL inline as needed.
#
# Put values in a `.env` file at the repo root (gitignored). docker
# compose substitutes ${VAR} and ${VAR:-default} from that file plus
# your shell env. Unset optional vars resolve to empty strings, which
# downstream code handles (the relevant feature just isn't available).
x-stash-env: &stash-env
  # Storage
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-}
  S3_REGION: ${S3_REGION:-auto}
  S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
  # Embeddings
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-auto}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  HF_TOKEN: ${HF_TOKEN:-}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
  EMBEDDING_DIMS: ${EMBEDDING_DIMS:-384}
  # LLM (summarizer + ask-the-stash)
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
  ANTHROPIC_FAST_MODEL: ${ANTHROPIC_FAST_MODEL:-claude-haiku-4-5}
  # Linear ticket enrichment
  LINEAR_API_KEY: ${LINEAR_API_KEY:-}
  LINEAR_API_URL: ${LINEAR_API_URL:-https://api.linear.app/graphql}
  # Integrations — Fernet key + per-provider OAuth credentials.
  INTEGRATIONS_ENCRYPTION_KEY: ${INTEGRATIONS_ENCRYPTION_KEY:-}
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:3456/api/v1/integrations/google/callback}
  GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
  GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
  GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:3456/api/v1/integrations/github/callback}
  NOTION_OAUTH_CLIENT_ID: ${NOTION_OAUTH_CLIENT_ID:-}
  NOTION_OAUTH_CLIENT_SECRET: ${NOTION_OAUTH_CLIENT_SECRET:-}
  NOTION_OAUTH_REDIRECT_URI: ${NOTION_OAUTH_REDIRECT_URI:-http://localhost:3456/api/v1/integrations/notion/callback}
  GOOGLE_PICKER_API_KEY: ${GOOGLE_PICKER_API_KEY:-}
  GOOGLE_PICKER_APP_ID: ${GOOGLE_PICKER_APP_ID:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stash
      POSTGRES_PASSWORD: stash
      POSTGRES_DB: stash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stash"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *stash-env
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      REDIS_URL: redis://redis:6379/0
      PUBLIC_URL: http://localhost:3457
      CORS_ORIGINS: "http://localhost:3457,http://localhost:3456"
    # /health returns 200 only after Alembic finishes inside the
    # lifespan, so worker + beat can wait on this before starting.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3456/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      <<: *stash-env
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      <<: *stash-env
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "backend.celery_app", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3457:3457"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3456
    depends_on:
      - backend

  collab:
    build:
      context: ./collab
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3458:3458"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      BACKEND_URL: http://backend:3456

volumes:
  postgres_data:
  redis_data:
